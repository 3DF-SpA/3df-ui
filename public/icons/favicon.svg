<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fondo verde bosque, esquinas levemente redondeadas -->
  <rect width="32" height="32" rx="5" fill="#2d4a1e"/>
  <!-- "3" grande arriba — el número domina el espacio -->
  <text
    x="16" y="18"
    font-family="'Arial Black', 'Impact', 'Helvetica Neue', sans-serif"
    font-size="18"
    font-weight="900"
    fill="#e8c464"
    text-anchor="middle">3</text>
  <!-- "DF" pequeño debajo, apretado -->
  <text
    x="16" y="28"
    font-family="'Arial Black', 'Impact', 'Helvetica Neue', sans-serif"
    font-size="10"
    font-weight="900"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="2">DF</text>
</svg>
